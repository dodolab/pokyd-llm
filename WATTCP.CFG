; WATTCP.CFG - Watt-32 network configuration for Pokyd LLM mode.
;
; Copy this file to the directory where you run pokyd.exe, or point the
; WATTCP environment variable to its full path:
;   SET WATTCP=C:\POKYD\WATTCP.CFG
;
; ---- DOSBox-X with slirp backend (development / testing) -----------------
; DOSBox-X slirp gives the guest a NAT network: the host machine is at 10.0.2.2.
; Run the Node bridge on the HOST and connect Pokyd from INSIDE DOSBox-X.
;
; Must match NE2000.COM software interrupt (first argument), typically 0x60.
PKT.VECTOR = 0x60
;
my_ip      = 10.0.2.15
netmask    = 255.255.255.0
gateway    = 10.0.2.2
nameserver = 8.8.8.8
hostname   = pokyd
;
; ---- Real hardware / LAN (edit for your network) -------------------------
; Uncomment and adjust these lines for a real DOS machine on your LAN.
; my_ip      = 192.168.1.100
; netmask    = 255.255.255.0
; gateway    = 192.168.1.1
; nameserver = 192.168.1.1
; hostname   = pokyd
