# Build Pokyd and publish an MS-DOS release zip when a git tag is pushed.
name: Release

on:
  push:
    tags:
      # Match numeric tags (1.0), v-prefixed (v1.0.0), and anything else.
      - '**'
  # Manual run (Actions tab) or re-run after a missed tag push.
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build and release
        required: true
        default: '1.0'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.meta.outputs.tag }}

      - name: Install Open Watcom
        run: |
          set -euo pipefail
          wget -q https://github.com/open-watcom/open-watcom-v2/releases/download/Current-build/ow-snapshot.tar.xz
          mkdir -p watcom
          tar xf ow-snapshot.tar.xz -C watcom
          test -x watcom/binl64/wcl || test -x watcom/binl/wcl

      - name: Bootstrap Watt-32 (LLM build)
        run: bash ./scripts/bootstrap-watt32-docker.sh

      - name: Build and package MS-DOS release
        env:
          WATCOM: ${{ github.workspace }}/watcom
          RELEASE_VERSION: ${{ steps.meta.outputs.tag }}
        run: bash ./scripts/package-release.sh "${{ steps.meta.outputs.tag }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: dist/pokyd-${{ steps.meta.outputs.tag }}-dos.zip
          generate_release_notes: true
